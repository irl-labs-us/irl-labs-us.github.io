  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found — IRL</title>
  <script>
    var path = window.location.pathname;
    if (path.startsWith('/connect')) {
      window.location.replace('/download');
    } else {
      window.location.replace('/');
    }
  </script>
